<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo_inicio.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>P2Price</title>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div style="background: var(--accent-blue); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold;">P2</div>
            <span class="brand-name">P2Price</span>
        </div>

        <nav>
            <p class="menu-label">Navegación</p>
            <button class="menu-item active" onclick="filtrar('todas')">🏠 Explorar</button>
            <a href="contactanos.html" class="menu-item">📧 Contacto</a>

            <p class="menu-label">Categorías</p>
            <div class="category-list">
                <button class="category-btn" onclick="filtrar('todas')">Todas</button>
                <button class="category-btn" onclick="filtrar('accion')">Acción</button>
                <button class="category-btn" onclick="filtrar('aventura')">Aventura</button>
                <button class="category-btn" onclick="filtrar('deportes')">Deportes</button>
                <button class="category-btn" onclick="filtrar('estrategia')">Estrategia</button>
                <button class="category-btn" onclick="filtrar('simulacion')">Simulación</button>
                <button class="category-btn" onclick="filtrar('survivalHorror')">Horror</button>
                <button class="category-btn" onclick="filtrar('Casual')">Casual</button>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <div class="search-container">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar títulos..." onkeyup="buscar()">
            </div>
            <div class="user-profile">
                <a href="inicio de session.html" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
                    <span>Mi Perfil</span>
                    <div style="width: 35px; height: 35px; background: #333; border-radius: 50%;"></div>
                </a>
            </div>
        </header>

        <section class="hero-carousel">
            <div class="carousel-item active">
                <img src="https://i0.wp.com/losreyesdelmando.com/wp-content/uploads/2019/09/dayz-portada.jpg?fit=1920%2C1080&ssl=1" alt="DayZ">
                <div class="hero-overlay">
                    <span class="badge">Más Jugado</span>
                    <h1>DayZ</h1>
                    <p>Un mundo abierto postapocalíptico donde tu única meta es sobrevivir.</p>
                    <div class="hero-buttons">
                        <a href="dayz.html" class="btn-main">Ver Detalles</a>
                    </div>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://www.clarin.com/2024/07/17/ORRRfEnDj_2000x1500__1.jpg" alt="Fifa 25">
                <div class="hero-overlay">
                    <span class="badge">Deportes</span>
                    <h1>EA Sports FC 25</h1>
                    <p>La experiencia de fútbol más auténtica hasta la fecha.</p>
                    <div class="hero-buttons">
                        <a href="fifa25.html" class="btn-main">Ver Detalles</a>
                    </div>
                </div>
            </div>
            
            <div class="carousel-controls">
                <button class="btn-control" onclick="changeSlide(-1)">❮</button>
                <button class="btn-control" onclick="changeSlide(1)">❯</button>
            </div>
        </section>

        <section class="section-header">
            <h2 id="tituloSeccion">Todos los Juegos</h2>
            <div class="games-grid" id="container">
                </div>
        </section>
    </main>

    <script>
        // BASE DE DATOS DE JUEGOS
        const datos = {
            aventura: [
                { nombre: "Hogwarts Legacy", img: "https://upload.wikimedia.org/wikipedia/commons/3/33/Hogwarts_Legacy_promotional_photo_horizontal.jpg", link: "Hogwarts Legacy.html" },
                { nombre: "Hollow Knight", img: "https://assets.nintendo.com/image/upload/q_auto/f_auto/store/software/switch/70010000003208/4643fb058642335c523910f3a7910575f56372f612f7c0c9a497aaae978d3e51", link: "HollowKnight.html" },
                { nombre: "The Forest", img: "https://media.vandal.net/m/4-2018/201841318231_1.jpg", link: "the forest.html" },
                { nombre: "Ark", img: "https://cdn2.unrealengine.com/egs-arkultimatesurvivoredition-studiowildcard-bundles-s1-2560x1440-ab6e094c452b.jpg", link: "ark.html" },
                { nombre: "Red Dead Redemption 2", img: "https://timelinecovers.pro/facebook-cover/download/video-games-red-dead-redemption-2-facebook-cover.jpg", link: "rdr2.html" }
            ],
            accion: [
                { nombre: "GTA V", img: "imagenes/gtaimg.jpg", link: "p2price.html" },
                { nombre: "Mortal Kombat 1", img: "https://static.wikia.nocookie.net/inmortalkombat/images/9/94/Mortal_kombat_1_primera_imagen.png", link: "mortakkombat1.html" },
                { nombre: "DayZ", img: "https://i0.wp.com/losreyesdelmando.com/wp-content/uploads/2019/09/dayz-portada.jpg?fit=1920%2C1080&ssl=1", link: "dayz.html" },
                { nombre: "Assassin's Creed Shadows", img: "https://store-images.s-microsoft.com/image/apps.62121.64148876922571625.4747b43e-3d86-49fc-aa97-ee00c70af4e5", link: "Assassin's Creed Shadows.html" },
                { nombre: "Atom Fall", img: "https://atomfall.com/images/atomfall-social-landscape.webp", link: "atom fall.html" },
                { nombre: "R.E.P.O", img: "https://media.vandal.net/m/2-2025/7/repo-2025278582591_6.jpg", link: "r.e.p.o.html" }
            ],
            deportes: [
                { nombre: "FC 25", img: "https://www.gamerfocus.co/wp-content/uploads/2025/02/maradona_ea_sports_fc_25.webp", link: "fifa25.html" },
                { nombre: "NBA 2K25", img: "https://sm.ign.com/ign_es/screenshot/default/nba-2k25_8a5r.jpg", link: "nba2k25.html" },
                { nombre: "F1 24", img: "https://cloudfront-eu-central-1.images.arcpublishing.com/diarioas/JULHEZQ27VBUFGHL7JOXKKL4R4.png", link: "f124.html" }
            ],
            estrategia: [
                { nombre: "Rust", img: "https://media.vandal.net/i/640x360/1-2021/20211111232453_1.jpg.webp", link: "rust.html" },
                { nombre: "Raft", img: "https://hardzone.es/app/uploads-hardzone.es/2022/11/raft1-1.jpg", link: "raft.html" }
            ],
            simulacion: [
                { nombre: "Human Fall Flat", img: "https://indistation.com/wp-content/uploads/2023/10/human-fall-flat-2-pack-scaled.jpg", link: "humanfallflat.html" },
                { nombre: "Phasmophobia", img: "https://cloudfront-us-east-1.images.arcpublishing.com/elcomercio/ASGS2UL7HJEK5DXPLV7Q53R75E.jpg", link: "phasmophobia.html" }
            ],
            survivalHorror: [
                { nombre: "RE 4 Remake", img: "https://i.3djuegos.com/juegos/18541/resident_evil_4_remake/fotos/ficha/resident_evil_4_remake-5789986.webp", link: "RE4.html" },
                { nombre: "Resident Evil 5", img: "https://images.steamusercontent.com/ugc/955210159019888133/2AD7BA771D136F7D65A2856A6A6ADD0DAED8CA0B/", link: "RE5.html" },
                { nombre: "Resident Evil 6", img: "https://i.blogs.es/5b59b4/280112_re6-logo/450_1000.webp", link: "RE6.html" }
            ],
            Casual: [
                { nombre: "Among Us", img: "https://cloudfront-us-east-1.images.arcpublishing.com/infobae/QWS3G66BBNE3LJQQ23TQ7OHDFE.jpg", link: "amongus.html" },
                { nombre: "Chained Together", img: "https://www.clavecd.es/wp-content/uploads/Chained-Together-1200x628-1.jpg", link: "Chained Together.html" }
            ]
        };

        const container = document.getElementById('container');
        const tituloSeccion = document.getElementById('tituloSeccion');

        // FUNCIÓN PARA RENDERIZAR JUEGOS
        function render(lista) {
            container.innerHTML = '';
            lista.forEach(j => {
                const card = document.createElement('a');
                card.href = j.link;
                card.className = 'juego-card';
                card.innerHTML = `
                    <img src="${j.img}" alt="${j.nombre}">
                    <p>${j.nombre}</p>
                `;
                container.appendChild(card);
            });
        }
        function crearCard(juego) {
    const card = document.createElement('a');
    card.href = juego.link;
    card.className = 'juego-card';
    card.innerHTML = `
        <div class="img-wrapper">
            <img src="${juego.img}" alt="${juego.nombre}">
        </div>
        <p>${juego.nombre}</p>
    `;
    container.appendChild(card);
}

        // FILTRADO POR CATEGORÍA
        function filtrar(cat) {
            if (cat === 'todas') {
                tituloSeccion.textContent = "Todos los Juegos";
                render(Object.values(datos).flat());
            } else {
                tituloSeccion.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                render(datos[cat] || []);
            }
            // Reset active state
            document.querySelectorAll('.menu-item, .category-btn').forEach(b => b.classList.remove('active'));
        }

        // BUSCADOR
        function buscar() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const todos = Object.values(datos).flat();
            const filtrados = todos.filter(j => j.nombre.toLowerCase().includes(query));
            tituloSeccion.textContent = query ? `Resultados para: ${query}` : "Todos los Juegos";
            render(filtrados);
        }

        // LÓGICA DEL CARRUSEL
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');

        function changeSlide(dir) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + dir + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Auto-cambio de slide cada 5 segundos
        setInterval(() => changeSlide(1), 5000);

        // Inicializar carga
        filtrar('todas');
    </script>
</body>
</html>
