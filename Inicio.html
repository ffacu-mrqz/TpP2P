        const container = document.getElementById('container');
        const tituloSeccion = document.getElementById('tituloSeccion');

        // FUNCIÓN PARA RENDERIZAR JUEGOS
        function render(lista) {
            container.innerHTML = '';
            lista.forEach(j => {
                const card = document.createElement('a');
                card.href = j.link;
                card.className = 'juego-card';
                card.innerHTML = `
                    <img src="${j.img}" alt="${j.nombre}">
                    <p>${j.nombre}</p>
                `;
                container.appendChild(card);
            });
        }
        function crearCard(juego) {
    const card = document.createElement('a');
    card.href = juego.link;
    card.className = 'juego-card';
    card.innerHTML = `
        <div class="img-wrapper">
            <img src="${juego.img}" alt="${juego.nombre}">
        </div>
        <p>${juego.nombre}</p>
    `;
    container.appendChild(card);
}

        // FILTRADO POR CATEGORÍA
        function filtrar(cat) {
            if (cat === 'todas') {
                tituloSeccion.textContent = "Todos los Juegos";
                render(Object.values(datos).flat());
            } else {
                tituloSeccion.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                render(datos[cat] || []);
            }
            // Reset active state
            document.querySelectorAll('.menu-item, .category-btn').forEach(b => b.classList.remove('active'));
        }

        // BUSCADOR
        function buscar() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const todos = Object.values(datos).flat();
            const filtrados = todos.filter(j => j.nombre.toLowerCase().includes(query));
            tituloSeccion.textContent = query ? `Resultados para: ${query}` : "Todos los Juegos";
            render(filtrados);
        }

        // LÓGICA DEL CARRUSEL
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');

        function changeSlide(dir) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + dir + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Auto-cambio de slide cada 5 segundos
        setInterval(() => changeSlide(1), 5000);

        // Inicializar carga
        filtrar('todas');
