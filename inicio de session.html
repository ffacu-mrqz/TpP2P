<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="iniciosesion.css" />
    <title>p2price</title>
  </head>
  <body>
    <div class="login-container">
      <a href="Inicio.html">
        <img src="imagenes/Logop2p.png" alt="logo" />
      </a>
      <h4>Inicio de Sesión</h4>
      <form id="loginForm">
        <div class="excepciondiv">
          Correo Electrónico:
          <input type="email" id="email" name="email" placeholder="Correo electrónico" />
          
        </div>
        <div class="excepciondiv">
          Contraseña:
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingrese su contraseña"
            />
            <button
              type="button"
              class="ojos"
              id="togglePassword"
              aria-label="Mostrar u ocultar contraseña"
            >
              <img
                id="eyeIcon"
                class="ojos"
                src="imagenes/ojo.png"
                alt="Mostrar contraseña"
              />
            </button>
          </div>
        </div>
        <div>
            <button type="submit">Ingresar</button>
          </a>
        </div>
      </form>
      <script>
        document
          .getElementById("loginForm")
          .addEventListener("submit", function (event) {
            event.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            if (!email || !password) {
              alert("Por favor, complete todos los campos.");
              return;
            }
            window.location.href = "Inicio.html";
          });
      </script>
      <div>
        ¿No tiene una cuenta de p2price?
        <a href="registrarse.html">
          <button class="register-button">Registrarse</button>
        </a>
      </div>
    </div>

    <script>
      const togglePassword = document.getElementById("togglePassword");
      const password = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");

      togglePassword.addEventListener("click", () => {
        const type = password.getAttribute("type");
        if (type === "password") {
          password.setAttribute("type", "text");
          eyeIcon.src = "imagenes/ojo (1).png"; // Cambia a un icono de ojo cerrado si tienes
          eyeIcon.alt = "Ocultar contraseña";
        } else {
          password.setAttribute("type", "password");
          eyeIcon.src = "imagenes/ojo.png"; // Icono de ojo abierto
          eyeIcon.alt = "Mostrar contraseña";
        }
      });
    </script>
  </body>
</html>
